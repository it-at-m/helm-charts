# Dave Document Storage
document-storage:
  # Environment variables
  extraEnvVars:
    JAVA_OPTIONS: -Djavax.net.ssl.trustStore=/mnt/cacerts -Djavax.net.ssl.trustStorePassword=changeit -Xmx512m
    SPRING_PROFILES_ACTIVE: dev,no-security
    KEYCLOAK_AUTH_SERVER_URL: http://dave-keycloak
    KEYCLOAK_AUTHSERVERURL: http://dave-keycloak
    REFARCH_S3_URL: s3.example.com
    REFARCH_S3_BUCKETNAME: dave-bucket
    REFARCH_S3_ACCESSKEY: EXAMPLE
    REFARCH_S3_SECRETKEY: dummysecret
    DE_MUENCHEN_REFARCH_INTEGRATION_S3_ENABLED: "false"
    SPRING_SECURITY_LOGGING_REQUESTS: all

keycloak:
  fullnameOverride: "dave-keycloak"
  keycloakConfigCli:
    annotations:
      # to trigger immediate execution of keycloak-config-ci
      helm.sh/hook: null

elasticsearch:
  fullnameOverride: "dave-elasticsearch"
  # keine persistent volumes im CI (kind)
  persistence:
    enabled: false
  esConfig:
    elasticsearch.yml: |
      xpack.security.enabled: false
      xpack.security.http.ssl.enabled: false
      xpack.security.transport.ssl.enabled: false
      discovery.type: single-node
  # geringe Ressourcen für CI/kind
  master:
    heapSize: 512m
    resources:
      limits:
        memory: 1Gi
      requests:
        memory: 512Mi

postgresql:
  fullnameOverride: dave-postgresql
  primary:
    persistence:
      enabled: false
  auth:
    postgresPassword: postgrespw               # Superuser-Passwort (optional)
    username: dave                              # erzeugter DB-User
    password: dave_pwd                      # Passwort für erzeugten User
    database: dave_db                           # erzeugte DB
