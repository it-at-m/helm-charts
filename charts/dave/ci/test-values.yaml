# Default specific values for dave.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global values
global:
  credentials:
    SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT-SECRET: WFhYWC1TRUNSRVQtWFhYWAo=

externalCharts:
  elasticsearch:
    # enable/disable elasticsearch chart dependency
    enabled: true
  postgresql:
    # enable/disable postgresql chart dependency
    enabled: true
  keycloak:
    # enable/disable keycloak chart dependency
    enabled: false
  backend:
    # enable/disable backend chart dependency
    enabled: true
  frontend:
    # enable/disable frontend chart dependency
    enabled: true
  adminportal:
    # enable/disable adminportal chart dependency
    enabled: false
  selfserviceportal:
    # enable/disable selfservice chart dependency
    enabled: false
  eai:
    # enable/disable eai chart dependency
    enabled: false
  documentstorage:
    # enable/disable documentstorage chart dependency
    enabled: false
  geodataeai:
    # enable/disable geodataeai chart dependency
    enabled: false

# Dave Backend
backend:
  # Environment Variables
  extraEnvVars:
    env:
      JAVA_OPTIONS:
        -Djavax.net.ssl.trustStore=/mnt/cacerts -Djavax.net.ssl.trustStorePassword=changeit
        -Xmx1g --add-modules java.se --add-exports java.base/jdk.internal.ref=ALL-UNNAMED
        --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.nio=ALL-UNNAMED
        --add-opens java.base/sun.nio.ch=ALL-UNNAMED --add-opens java.management/sun.management=ALL-UNNAMED
        --add-opens jdk.management/com.sun.management.internal=ALL-UNNAMED
      SPRING_PROFILES_ACTIVE: dev,no-security
#      SPRING_FLYWAY_ENABLED: "false"
      KEYCLOAK_AUTH_SERVER_URL: http://dave-keycloak
      KEYCLOAK_AUTHSERVERURL: http://dave-keycloak
      # Elasticsearch
      ELASTICSEARCH_SECURITY_ENABLED: "false"
      ELASTICSEARCH_SECURITY_TLS_AUTOGENERATED: "false"
      ELASTICSEARCH_SCHEME: http
      ELASTICSEARCH_HTTPCACERTIFICATE: ""
    # Dave Email Settings
#    email:
      DAVE_EMAIL_RECEIVER_HOSTNAME: imap.example.com
      DAVE_EMAIL_SENDER_HOSTNAME: smtp.example.com
      DAVE_EMAIL_ADDRESS: dave-dev@example.com
      DAVE_EMAIL_RECEIVER_CUT_EMAIL_BODY_LINE_CONTAINS_STRINGS: Example City;-----Ursprüngliche Nachricht-----;dave-dev@example.com,
  # Credentials
  credentials:
    DAVE_EMAIL_PASSWORD: WFhYWC1TRUNSRVQtWFhYWAo=
  # Volume for CA-Certfificates
  # extraVolumeMounts:
  #   - name: cacerts
  #     readOnly: true
  #     mountPath: /mnt
  # extraVolumes:
  #   - name: cacerts
  #     secret:
  #       secretName: cacerts
  #       defaultMode: 420

# Dave Admin-Portal
admin-portal:
  # Environment variables
  extraEnvVars:
    JAVA_OPTIONS:
      -Djavax.net.ssl.trustStore=/mnt/cacerts -Djavax.net.ssl.trustStorePassword=changeit
      --add-modules java.se --add-exports java.base/jdk.internal.ref=ALL-UNNAMED --add-opens
      java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.nio=ALL-UNNAMED --add-opens
      java.base/sun.nio.ch=ALL-UNNAMED --add-opens java.management/sun.management=ALL-UNNAMED
      --add-opens jdk.management/com.sun.management.internal=ALL-UNNAMED
    SPRING_PROFILES_ACTIVE: dev,no-security
    SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_URI: http://dave-keycloak/
    SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER-URI: http://dave-keycloak/realms/dave
  # Volume for CA-Certfificates
  # extraVolumeMounts:
  #   - name: cacerts
  #     readOnly: true
  #     mountPath: /mnt
  # extraVolumes:
  #   - name: cacerts
  #     secret:
  #       secretName: cacerts
  #       defaultMode: 420
  ingress:
    enabled: true
    className: ""
    hosts:
      - host: dave-admin-portal.example.de
        paths:
          - path: /
            pathType: ImplementationSpecific

